<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Login with Star Particle Background</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Background gradient space yang lebih gelap agar bintang terlihat jelas */
      background: radial-gradient(circle at top, #1a1a2e, #0d0d14);
      overflow: hidden;
      position: relative;
    }

    /* === STYLES UNTUK PARTICLE CANVAS === */
    #particleCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0; /* Di belakang form */
    }

    /* Efek Glow Latar Belakang (dipertahankan & disesuaikan) */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(102,126,234,0.3), transparent 70%);
      top: -150px;
      left: -150px;
      animation: moveGlow 15s infinite alternate;
      z-index: 1; /* Di atas canvas, di bawah form */
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(118,75,162,0.3), transparent 70%);
      bottom: -150px;
      right: -150px;
      animation: moveGlow 20s infinite alternate-reverse;
      z-index: 1; /* Di atas canvas, di bawah form */
    }

    @keyframes moveGlow {
      0% { transform: translate(0, 0); }
      100% { transform: translate(80px, 80px); }
    }

    /* === STYLES UNTUK FORM (Dipertahankan) === */
    .container {
      width: 380px;
      height: 500px;
      perspective: 1200px;
      z-index: 10; /* Di depan canvas dan glow */
      position: relative;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .container.active .card {
      transform: rotateY(180deg);
    }

    .form-box {
      position: absolute;
      width: 100%;
      height: 100%;
      /* Glassmorphism effect diperkuat agar kontras dengan background baru */
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      backface-visibility: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .signup {
      transform: rotateY(180deg);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .input-box {
      margin-bottom: 15px;
    }

    .input-box input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      background: rgba(0,0,0,0.2);
      color: #fff;
      transition: 0.3s;
    }

    .input-box input:focus {
      border: 1px solid #8a9cff;
      background: rgba(0,0,0,0.3);
      box-shadow: 0 0 15px rgba(138,156,255,0.4);
    }

    .input-box input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(102,126,234,0.5);
      opacity: 0.95;
    }

    .forgot {
      text-align: right;
      font-size: 12px;
      margin-top: 5px;
      cursor: pointer;
      color: #bbb;
      transition: 0.3s;
    }

    .forgot:hover {
      color: #fff;
    }

    .social {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .social button {
      flex: 1;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      font-weight: 400;
      margin-top: 0;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .social button:hover {
      background: rgba(255,255,255,0.15);
    }

    p {
      text-align: center;
      margin-top: auto;
      font-size: 14px;
      color: #ccc;
    }

    span {
      color: #a8b2ff;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    span:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="container" id="container">
    <div class="card">
      <div class="form-box login">
        <h2>Welcome Back</h2>
        <div class="input-box">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required>
        </div>
        <div class="forgot">Forgot Password?</div>
        <button>Login</button>

        <div class="social">
          <button>Google</button>
          <button>Facebook</button>
        </div>

        <p>Don't have an account? <span onclick="flip()">Sign up</span></p>
      </div>

      <div class="form-box signup">
        <h2>Create Account</h2>
        <div class="input-box">
          <input type="text" placeholder="Username" required>
        </div>
        <div class="input-box">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required>
        </div>
        <button>Sign Up</button>

        <div class="social">
          <button>Google</button>
          <button>Facebook</button>
        </div>

        <p>Already have an account? <span onclick="flip()">Login</span></p>
      </div>
    </div>
  </div>

  <script>
    // --- JAVASCRIPT UNTUK FLIP FORM (Dipertahankan) ---
    function flip() {
      document.getElementById('container').classList.toggle('active');
    }

    // --- JAVASCRIPT UNTUK PARTICLE BACKGROUND (BINTANG BERGERAK) ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    // Menyesuaikan ukuran canvas dengan ukuran window
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Array untuk menampung data bintang
    const stars = [];
    const numStars = 150; // Jumlah bintang

    // Membuat data bintang acak
    for (let i = 0; i < numStars; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5, // Ukuran bintang acak
        vx: (Math.random() - 0.5) * 0.5, // Kecepatan X acak (gerak lambat)
        vy: (Math.random() - 0.5) * 0.5, // Kecepatan Y acak (gerak lambat)
        alpha: Math.random() // Transparansi awal acak
      });
    }

    // Fungsi untuk menggambar dan menggerakkan bintang
    function animate() {
      // Membersihkan canvas setiap frame
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Menggambar setiap bintang
      for (let i = 0; i < numStars; i++) {
        const s = stars[i];

        // Update posisi
        s.x += s.vx;
        s.y += s.vy;

        // Warp effect: Jika bintang keluar layar, munculkan lagi dari sisi berlawanan
        if (s.x < 0) s.x = canvas.width;
        if (s.x > canvas.width) s.x = 0;
        if (s.y < 0) s.y = canvas.height;
        if (s.y > canvas.height) s.y = 0;

        // Efek kedip (twinkle) sederhana
        s.alpha += (Math.random() - 0.5) * 0.02;
        if (s.alpha < 0.1) s.alpha = 0.1;
        if (s.alpha > 0.9) s.alpha = 0.9;

        // Menggambar lingkaran bintang
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`; // Warna putih dengan transparansi
        ctx.fill();
      }

      // Memanggil fungsi animate lagi pada frame berikutnya
      requestAnimationFrame(animate);
    }

    // Memulai animasi
    animate();
  </script>

</body>
</html>
