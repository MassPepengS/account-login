<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  width: 350px;
  height: 450px;
  perspective: 1000px;
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.container.active .card {
  transform: rotateY(180deg);
}

.form-box {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fff;
  border-radius: 15px;
  padding: 30px;
  backface-visibility: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.signup {
  transform: rotateY(180deg);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: #fff;
  cursor: pointer;
  margin-top: 10px;
}

p {
  text-align: center;
  margin-top: 15px;
}

span {
  color: #667eea;
  cursor: pointer;
  font-weight: bold;
}

  </style>
</head>
<body>  <div class="container" id="container">
    <div class="card"><!-- Login -->
  <div class="form-box login">
    <h2>Login</h2>
    <div class="input-box">
      <input type="email" placeholder="Email">
    </div>
    <div class="input-box">
      <input type="password" placeholder="Password">
    </div>
    <button>Login</button>
    <p>Don't have an account? <span onclick="flip()">Sign up</span></p>
  </div>

  <!-- Signup -->
  <div class="form-box signup">
    <h2>Sign Up</h2>
    <div class="input-box">
      <input type="text" placeholder="Username">
    </div>
    <div class="input-box">
      <input type="email" placeholder="Email">
    </div>
    <div class="input-box">
      <input type="password" placeholder="Password">
    </div>
    <button>Sign Up</button>
    <p>Already have an account? <span onclick="flip()">Login</span></p>
  </div>

</div>

  </div>  <script>
    function flip() {
      document.getElementById('container').classList.toggle('active');
    }
  </script></body>
</html>
