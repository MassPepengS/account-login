<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login/Signup Form - Dark Edition</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Update: Gradien latar belakang lebih gelap (Deep Navy) */
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            /* Update: Warna panel utama (Dark Purple-Grey) */
            background: #1e293b; 
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container h1 {
            font-size: 36px;
            margin: -10px 0;
            color: #fff; /* Teks Putih */
        }

        .container p {
            font-size: 14.5px;
            margin: 15px 0;
            color: #cbd5e1; /* Abu-abu terang */
        }

        form {
            width: 100%;
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            /* Update: Background form box */
            background: #1e293b;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box {
            right: 50%;
        }

        .form-box.register {
            visibility: hidden;
        }

        .container.active .form-box.register {
            visibility: visible;
        }

        .input-box {
    position: relative;
}

/* Label default */
.input-box label {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 14px;
    pointer-events: none;
    transition: 0.25s ease;
    background: transparent;
}

/* Saat focus atau ada isi */
.input-box input:focus ~ label,
.input-box input:valid ~ label {
    top: -8px;
    left: 15px;
    font-size: 12px;
    color: #6366f1;
    background: #1e293b;
    padding: 0 5px;
}

        .input-box input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
}      

        .forgot-link {
            margin: -15px 0 15px;
        }

        .forgot-link a {
            font-size: 14.5px;
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            height: 48px;
            /* Update: Gradien tombol (Indigo to Purple) */
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
        }

        /* Hover effect tombol utama */
.btn {
    transition: all 0.25s ease;
}

.btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
}

/* Efek klik (biar terasa responsif) */
.btn:active {
    transform: translateY(-1px);
    box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
}

        .social-icons {
            display: flex;
            justify-content: center;
        }

        .social-icons a {
            display: inline-flex;
            padding: 10px;
            /* Update: Border icon social */
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 24px;
            color: #fff;
            margin: 0 8px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            background: #334155;
        }

        .toggle-box {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            /* Update: Warna overlay (Indigo) */
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before {
            left: 50%;
        }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }

        .toggle-panel.toggle-left {
            left: 0;
            transition-delay: 1.2s;
        }

        .container.active .toggle-panel.toggle-left {
            left: -50%;
            transition-delay: 0.6s;
        }

        .toggle-panel.toggle-right {
            right: -50%;
            transition-delay: 0.6s;
        }

        .container.active .toggle-panel.toggle-right {
            right: 0;
            transition-delay: 1.2s;
        }

        .toggle-panel p {
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .toggle-panel .btn {
            width: 160px;
            height: 46px;
            background: transparent;
            border: 2px solid #fff;
            box-shadow: none;
        }

/* Smooth transition untuk input */
.input-box input {
    transition: all 0.25s ease;
}

/* Animasi saat toggle */
.input-box input.showing {
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
}

/* Animasi icon */
.toggle-password {
    transition: transform 0.25s ease, opacity 0.2s ease;
}

.toggle-password.active {
    transform: rotate(180deg) scale(1.2);
    opacity: 0.8;
}

        /* Mobile Responsive Tetap Sama */
        @media screen and (max-width: 650px) {
            .container { height: calc(100vh - 40px); }
            .form-box { bottom: 0; width: 100%; height: 70%; background: #1e293b; }
            .container.active .form-box { right: 0; bottom: 30%; }
            .toggle-box::before { left: 0; top: -270%; width: 100%; height: 300%; border-radius: 20vw; }
            .container.active .toggle-box::before { left: 0; top: 70%; }
            .container.active .toggle-panel.toggle-left { left: 0; top: -30%; }
            .toggle-panel { width: 100%; height: 30%; }
            .toggle-panel.toggle-left { top: 0; }
            .toggle-panel.toggle-right { right: 0; bottom: -30%; }
            .container.active .toggle-panel.toggle-right { bottom: 0; }
        }

        @media screen and (max-width: 400px) {
            .form-box { padding: 20px; }
            .toggle-panel h1 { font-size: 30px; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bx-hide toggle-password'></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                    <a href="#"><i class='bx bxl-twitter'></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bx-hide toggle-password'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>or register with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                    <a href="#"><i class='bx bxl-twitter'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn" id="register">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn" id="login">Login</button>
            </div>
        </div>
    </div>

    <script>
const container = document.getElementById('container');
const registerBtn = document.getElementById('register');
const loginBtn = document.getElementById('login');

registerBtn.addEventListener('click', () => {
    container.classList.add('active');
});

loginBtn.addEventListener('click', () => {
    container.classList.remove('active');
});

/* TOGGLE + ANIMASI HALUS */
document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function () {

        const input = this.parentElement.querySelector('input');
        if (!input) return;

        /* aktifkan animasi */
        input.classList.add('showing');
        this.classList.add('active');

        setTimeout(() => {
            if (input.type === "password") {
                input.type = "text";
                this.classList.replace('bx-hide', 'bx-show');
            } else {
                input.type = "password";
                this.classList.replace('bx-show', 'bx-hide');
            }

            /* hapus animasi */
            input.classList.remove('showing');
            this.classList.remove('active');

        }, 120);

    });
});
</script>
