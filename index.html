<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login/Signup Form - Dark Edition</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: #1e293b; 
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container h1 {
            font-size: 36px;
            margin: -10px 0;
            color: #fff;
        }

        .container p {
            font-size: 14.5px;
            margin: 15px 0;
            color: #cbd5e1;
        }

        form { width: 100%; }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #1e293b;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box { right: 50%; }

        .form-box.register { visibility: hidden; }
        .container.active .form-box.register { visibility: visible; }

        .input-box {
            position: relative;
            margin: 30px 0;
        }

        .input-box input {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #334155;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            font-size: 16px;
            color: #fff;
        }

        .input-box input::placeholder { color: #94a3b8; }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #fff;
            cursor: pointer;
        }

        .forgot-link { margin: -15px 0 15px; }

        .forgot-link a { color: #94a3b8; }

        .btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        .social-icons { display: flex; justify-content: center; }

        .social-icons a {
            display: inline-flex;
            padding: 10px;
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 24px;
            color: #fff;
            margin: 0 8px;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            z-index: 2;
        }

        @media screen and (max-width: 650px) {
            .container { height: calc(100vh - 40px); }
            .form-box { bottom: 0; width: 100%; height: 70%; }
        }
    </style>
</head>

<body>

<div class="container" id="container">

    <!-- LOGIN -->
    <div class="form-box login">
        <form>
            <h1>Login</h1>

            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class='bx bx-hide toggle-password'></i>
            </div>

            <div class="forgot-link">
                <a href="#">Forgot Password?</a>
            </div>

            <button class="btn">Login</button>
        </form>
    </div>

    <!-- REGISTER -->
    <div class="form-box register">
        <form>
            <h1>Registration</h1>

            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="email" placeholder="Email" required>
                <i class='bx bxs-envelope'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class='bx bx-hide toggle-password'></i>
            </div>

            <button class="btn">Register</button>
        </form>
    </div>

</div>

<script>
const container = document.getElementById('container');

/* TOGGLE PASSWORD */
document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function () {
        const input = this.parentElement.querySelector('input');

        if (input.type === "password") {
            input.type = "text";
            this.classList.replace('bx-hide','bx-show');
        } else {
            input.type = "password";
            this.classList.replace('bx-show','bx-hide');
        }
    });
});
</script>

</body>
</html>
