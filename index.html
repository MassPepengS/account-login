<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Modern Login/Signup</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: #1e293b; 
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #1e293b;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box { right: 50%; }
        .form-box.register { visibility: hidden; }
        .container.active .form-box.register { visibility: visible; }

        .input-box {
            position: relative;
            margin: 25px 0;
        }

        .input-box input {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #334155;
            border-radius: 8px;
            border: 1px solid transparent;
            outline: none;
            font-size: 16px;
            color: #fff;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #fff;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .social-icons a {
            display: inline-flex;
            padding: 10px;
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 24px;
            color: #fff;
            margin: 0 8px;
            transition: 0.3s;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }

        .toggle-left { left: 0; transition-delay: 1.2s; }
        .container.active .toggle-left { left: -50%; transition-delay: 0.6s; }
        .toggle-right { right: -50%; transition-delay: 0.6s; }
        .container.active .toggle-right { right: 0; transition-delay: 1.2s; }

        /* --- PERBAIKAN RESPONSIVE MOBILE (FOCUS AREA) --- */
        @media screen and (max-width: 650px) {
            .container { 
                width: 95%;
                height: 90vh; 
                display: flex;
                flex-direction: column;
            }

            .form-box {
                bottom: 0;
                width: 100%;
                height: 75%; /* Memberi ruang lebih untuk input */
                padding: 20px;
                overflow-y: auto; /* Agar bisa di-scroll jika layar terlalu kecil */
            }

            .container.active .form-box {
                right: 0;
                bottom: 25%; /* Menggeser form register ke atas sedikit */
            }

            .toggle-box::before {
                left: 0;
                top: -270%;
                width: 100%;
                height: 300%;
                border-radius: 20vw;
            }

            .container.active .toggle-box::before {
                left: 0;
                top: 75%;
            }

            .toggle-panel {
                width: 100%;
                height: 25%; /* Panel biru lebih kecil di mobile */
            }

            .toggle-panel.toggle-left { top: 0; }
            .toggle-panel.toggle-right { right: 0; bottom: -25%; }
            .container.active .toggle-panel.toggle-right { bottom: 0; }

            .container.active .toggle-panel.toggle-left { top: -25%; }
            
            /* Menyesuaikan ukuran teks agar muat */
            h1 { font-size: 28px !important; }
            .input-box { margin: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" class="password-input" required>
                    <i class='bx bx-hide toggle-pass'></i>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" class="password-input" required>
                    <i class='bx bx-hide toggle-pass'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>or register with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn" style="width: 140px; background: transparent; border: 2px solid #fff;" id="register">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn" style="width: 140px; background: transparent; border: 2px solid #fff;" id="login">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => container.classList.add('active'));
        loginBtn.addEventListener('click', () => container.classList.remove('active'));

        // Show/Hide Password
        document.querySelectorAll('.toggle-pass').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.parentElement.querySelector('.password-input');
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.replace('bx-hide', 'bx-show');
                } else {
                    input.type = 'password';
                    this.classList.replace('bx-show', 'bx-hide');
                }
            });
        });
    </script>
</body>
</html>
