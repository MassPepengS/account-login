<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Mobile Navigation</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: #1e293b; 
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #1e293b;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
        }

        .container.active .form-box { right: 50%; }
        .form-box.register { visibility: hidden; }
        .container.active .form-box.register { visibility: visible; }

        form { width: 100%; }
        h1 { font-size: 36px; margin-bottom: 10px; }

        .input-box { position: relative; margin: 20px 0; }
        .input-box input {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #334155;
            border-radius: 8px;
            border: 1px solid transparent;
            outline: none;
            font-size: 16px;
            color: #fff;
            transition: 0.3s;
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #fff;
        }

        .btn-submit {
            width: 100%;
            height: 48px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            transition: 0.3s;
            margin: 10px 0 20px;
        }

        .social-text { font-size: 14px; color: #cbd5e1; margin-bottom: 15px; display: block; }
        .social-icons { display: flex; justify-content: center; gap: 15px; }
        .social-icons a {
            padding: 10px;
            border: 2px solid #334155;
            border-radius: 10px;
            font-size: 20px;
            color: #fff;
        }

        /* Toggle Animation Desktop */
        .toggle-box { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }
        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: 0.6s ease-in-out;
            padding: 0 30px;
            text-align: center;
        }

        .toggle-left { left: 0; transition-delay: 1.2s; }
        .container.active .toggle-left { left: -50%; transition-delay: 0.6s; }
        .toggle-right { right: -50%; transition-delay: 0.6s; }
        .container.active .toggle-right { right: 0; transition-delay: 1.2s; }

        .btn-toggle {
            width: 140px;
            height: 45px;
            background: transparent;
            border: 2px solid #fff;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* --- MOBILE REPAIR --- */
        @media screen and (max-width: 650px) {
            .container {
                width: 95%;
                height: 700px; /* Menambah tinggi sedikit agar tidak sesak */
            }

            .form-box {
                width: 100%;
                height: 70%;
                bottom: 0;
                right: 0 !important;
                transition: 0.6s ease-in-out;
            }

            .container .form-box.login {
                transform: translateY(0);
                visibility: visible;
            }
            .container.active .form-box.login {
                transform: translateY(100%);
                visibility: hidden;
            }

            .container .form-box.register {
                transform: translateY(-100%);
                visibility: hidden;
            }
            .container.active .form-box.register {
                transform: translateY(0);
                visibility: visible;
                z-index: 5;
            }

            /* Toggle Box Mobile Shape */
            .toggle-box::before {
                left: 0;
                top: -270%;
                width: 100%;
                height: 300%;
                border-radius: 0 0 50% 50%;
            }
            .container.active .toggle-box::before {
                top: 70%;
                border-radius: 50% 50% 0 0;
            }

            .toggle-panel {
                width: 100%;
                height: 30%;
                padding: 10px;
            }

            /* Tombol Register (Warna Biru di ATAS saat Login) */
            .toggle-panel.toggle-left {
                top: 0;
                left: 0;
                transition-delay: 0.6s;
            }
            .container.active .toggle-panel.toggle-left {
                top: -30%; /* Keluar layar saat register aktif */
            }

            /* Tombol Login (Warna Biru di BAWAH saat Register) */
            .toggle-panel.toggle-right {
                bottom: -30%; /* Tersembunyi di bawah saat login aktif */
                right: 0;
                transition-delay: 0.6s;
            }
            .container.active .toggle-panel.toggle-right {
                bottom: 0; /* Muncul di bawah saat register aktif */
                transition-delay: 1.2s;
            }

            h1 { font-size: 26px; }
            .btn-toggle { margin-top: 10px; height: 40px; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" class="password-input" required>
                    <i class='bx bx-hide toggle-pass'></i>
                </div>
                <button type="submit" class="btn-submit">Login</button>
                <span class="social-text">or login with social platforms</span>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" class="password-input" required>
                    <i class='bx bx-hide toggle-pass'></i>
                </div>
                <button type="submit" class="btn-submit">Register</button>
                <span class="social-text">or register with social platforms</span>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn-toggle" id="register">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn-toggle" id="login">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => container.classList.add('active'));
        loginBtn.addEventListener('click', () => container.classList.remove('active'));

        document.querySelectorAll('.toggle-pass').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.parentElement.querySelector('.password-input');
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.replace('bx-hide', 'bx-show');
                } else {
                    input.type = 'password';
                    this.classList.replace('bx-show', 'bx-hide');
                }
            });
        });
    </script>
</body>
</html>
