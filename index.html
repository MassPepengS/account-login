<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Login & Register</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Latar Belakang Gambar Dino/Hutan */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.imgur.com/6ah360H.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
        }

        /* Form Styling */
        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: 0.6s ease-in-out;
            color: #fff;
            z-index: 1;
        }

        .container.active .form-box.login {
            transform: translateX(100%);
            opacity: 0;
            visibility: hidden;
        }

        .form-box.register {
            transform: translateX(100%);
            opacity: 0;
            visibility: hidden;
        }

        .container.active .form-box.register {
            transform: translateX(0);
            opacity: 1;
            visibility: visible;
            left: 0;
        }

        h1 { font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }

        .input-box {
            position: relative;
            width: 100%;
            margin: 15px 0;
        }

        /* Style Input & Placeholder */
        .input-box input {
            width: 100%;
            padding: 13px 45px 13px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            outline: none;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        /* Mencerahkan tulisan di dalam box agar terbaca */
        .input-box input::placeholder {
            color: #eeeeee; /* Putih terang */
            opacity: 0.9;
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            transition: 0.3s;
        }

        /* Efek Glow HIJAU saat diklik */
        .input-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #4CAF50; /* Hijau */
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); /* Glow Hijau */
        }

        .input-box input:focus + i {
            color: #4CAF50;
        }

        /* Tombol Modern */
        .btn {
            width: 100%;
            height: 48px;
            background: #4CAF50; /* Hijau agar senada */
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Panel Samping (Switch) */
        .toggle-box {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: #4CAF50; /* Hijau */
            border-radius: 150px;
            z-index: 2;
            transition: 1.2s ease-in-out;
        }

        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 2;
            transition: 0.6s ease-in-out;
            text-align: center;
            padding: 0 20px;
        }

        .toggle-left { left: 0; }
        .container.active .toggle-left { left: -50%; }

        .toggle-right { right: -50%; }
        .container.active .toggle-right { right: 0; }

        .toggle-panel .btn {
            width: 150px;
            background: transparent;
            border: 2px solid #fff;
            margin-top: 20px;
        }

        .toggle-panel .btn:hover {
            background: #fff;
            color: #4CAF50;
        }

        /* Responsif Mobile */
        @media screen and (max-width: 650px) {
            .container {
                width: 100%;
                height: auto;
                flex-direction: column;
                overflow: visible;
                background: rgba(0, 0, 0, 0.4);
            }

            .form-box {
                position: relative;
                width: 100%;
                height: auto;
                padding: 40px 20px;
                transform: none !important;
                visibility: visible !important;
                opacity: 1 !important;
            }

            .form-box.register, .container.active .form-box.login {
                display: none;
            }

            .container.active .form-box.register {
                display: flex;
            }

            .toggle-box::before { display: none; }

            .toggle-panel {
                position: relative;
                width: 100%;
                height: 150px;
                left: 0 !important;
                right: 0 !important;
                background: rgba(76, 175, 80, 0.8);
                border-radius: 0 0 30px 30px;
            }

            .toggle-left, .container.active .toggle-right { display: none; }
            .container.active .toggle-left { display: flex; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h2>Hello, Friend!</h2>
                <p>Belum punya akun?</p>
                <button class="btn" id="register">Daftar Sekarang</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h2>Welcome Back!</h2>
                <p>Sudah punya akun?</p>
                <button class="btn" id="login">Masuk</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.onclick = () => {
            container.classList.add('active');
        };

        loginBtn.onclick = () => {
            container.classList.remove('active');
        };
    </script>
</body>
</html>
