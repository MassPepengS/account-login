<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism - Mobile Optimized</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            padding: 20px;
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: height 0.5s ease;
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out;
        }

        /* Logic Visibility untuk mencegah penumpukan teks */
        .form-box.login { opacity: 1; visibility: visible; }
        .form-box.register { opacity: 0; visibility: hidden; }

        .container.active .form-box.login {
            right: 50%;
            opacity: 0;
            visibility: hidden;
        }

        .container.active .form-box.register {
            right: 50%;
            opacity: 1;
            visibility: visible;
            transition-delay: 0.2s;
        }

        /* Form Elements */
        h1 { font-size: 32px; color: #fff; margin-bottom: 10px; }
        p { font-size: 14px; color: #cbd5e1; margin: 10px 0; }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        .input-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
        }

        .btn {
            width: 100%;
            height: 45px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); }

        .social-icons a {
            display: inline-flex;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            margin: 0 5px;
            font-size: 20px;
        }

        /* Toggle Panel */
        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.5s ease-in-out;
        }

        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }

        .toggle-left { left: 0; transition-delay: 1s; }
        .container.active .toggle-left { left: -50%; transition-delay: 0.5s; }

        .toggle-right { right: -50%; transition-delay: 0.5s; }
        .container.active .toggle-right { right: 0; transition-delay: 1s; }

        .toggle-panel .btn {
            background: transparent;
            border: 2px solid #fff;
            width: 140px;
            box-shadow: none;
        }

        /* --- MEDIA QUERY: PERBAIKAN MOBILE --- */
        @media screen and (max-width: 650px) {
            .container {
                width: 100%;
                height: 650px; /* Tinggi disesuaikan */
                display: flex;
                flex-direction: column;
            }

            .form-box {
                width: 100%;
                height: 70%;
                bottom: 0;
                right: 0 !important; /* Paksa tetap di tengah */
                padding: 30px;
            }

            .container.active .form-box.login, 
            .container.active .form-box.register {
                right: 0 !important;
                bottom: 0;
            }

            .toggle-box::before {
                left: 0;
                top: -270%;
                width: 100%;
                height: 300%;
                border-radius: 0 0 50% 50%;
            }

            .container.active .toggle-box::before {
                top: 70%;
                left: 0;
            }

            .toggle-panel {
                width: 100%;
                height: 30%;
            }

            .toggle-left { top: 0; left: 0; }
            .container.active .toggle-left { top: -30%; left: 0; }

            .toggle-right { bottom: -30%; right: 0; }
            .container.active .toggle-right { bottom: 0; right: 0; }
            
            h1 { font-size: 24px; }
            .input-box { margin: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with social</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>or register with social</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Friend!</h1>
                <p>Don't have an account?</p>
                <button class="btn" id="to-register">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn" id="to-login">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const toRegister = document.getElementById('to-register');
        const toLogin = document.getElementById('to-login');

        toRegister.addEventListener('click', () => {
            container.classList.add('active');
        });

        toLogin.addEventListener('click', () => {
            container.classList.remove('active');
        });
    </script>
</body>
</html>
