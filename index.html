<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism - Mobile Optimized</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            padding: 20px;
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: height 0.5s ease;
        }

        /* --- DESKTOP STYLES (NO CHANGES) --- */
        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out;
        }

        .form-box.login { opacity: 1; visibility: visible; }
        .form-box.register { opacity: 0; visibility: hidden; }

        .container.active .form-box.login {
            right: 50%;
            opacity: 0;
            visibility: hidden;
        }

        .container.active .form-box.register {
            right: 50%;
            opacity: 1;
            visibility: visible;
            transition-delay: 0.2s;
        }

        h1 { font-size: 32px; color: #fff; margin-bottom: 10px; }
        p { font-size: 14px; color: #cbd5e1; margin: 10px 0; }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        .input-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
        }

        .btn {
            width: 100%;
            height: 45px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); }

        .social-icons-box {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .social-icons-box a {
            display: inline-flex;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.5s ease-in-out;
        }

        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }

        .toggle-left { left: 0; transition-delay: 1s; }
        .container.active .toggle-left { left: -50%; transition-delay: 0.5s; }

        .toggle-right { right: -50%; transition-delay: 0.5s; }
        .container.active .toggle-right { right: 0; transition-delay: 1s; }

        .toggle-panel .btn {
            background: transparent;
            border: 2px solid #fff;
            width: 140px;
            box-shadow: none;
        }

        /* --- MEDIA QUERY: PERBAIKAN MOBILE (REGISTRATION PANEL) --- */
        @media screen and (max-width: 650px) {
            .container {
                width: 100%;
                height: 700px; /* Tinggi dinaikkan sedikit untuk ruang */
                display: flex;
                flex-direction: column;
            }

            .form-box {
                width: 100%;
                height: 70%;
                bottom: 0;
                right: 0 !important;
                padding: 30px; /* Padding dasar diturunkan */
            }

            /* --- PERBAIKAN KHUSUS PANEL REGISTER DI MOBILE --- */
            .form-box.register {
                padding: 15px 30px; /* Padding vertikal (atas-bawah) diperkecil */
                justify-content: flex-start; /* Konten mulai dari atas */
            }

            .form-box.register h1 {
                font-size: 26px; /* Ukuran font judul diperkecil */
                margin-top: 10px; /* Beri jarak dari atas panel */
                margin-bottom: 15px; /* Jarak ke elemen di bawahnya diperkecil */
            }

            .form-box.register .input-box {
                margin: 10px 0; /* Jarak antar input box diperkecil */
            }

            .form-box.register .input-box input {
                padding: 10px 45px 10px 15px; /* Padding vertikal input diperkecil */
                font-size: 14px; /* Ukuran font input diperkecil */
            }

            .form-box.register button.btn {
                margin-top: 10px; /* Beri jarak sedikit di atas tombol */
                height: 42px; /* Tinggi tombol diperkecil */
            }

            .form-box.register p {
                font-size: 12px; /* Ukuran font teks 'or register with' diperkec
