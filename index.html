<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login/Signup Form - Glassmorphism Fixed</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            text-decoration: none;
            list-style: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- Perbaikan Form Box --- */
        .form-box {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: all 0.6s ease-in-out;
            z-index: 1;
        }

        /* Login di kanan secara default */
        .form-box.login {
            right: 0;
            opacity: 1;
            visibility: visible;
        }

        /* Saat Register Aktif: Sembunyikan Login */
        .container.active .form-box.login {
            right: 50%; /* Bergeser ke kiri */
            opacity: 0;
            visibility: hidden;
        }

        /* Register disembunyikan di kanan secara default */
        .form-box.register {
            right: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Saat Register Aktif: Tampilkan Register */
        .container.active .form-box.register {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            z-index: 2;
        }

        form {
            width: 100%;
            text-align: center;
            color: #fff;
        }

        form h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .input-box {
            position: relative;
            margin: 25px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            color: #fff;
            font-size: 15px;
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .forgot-link {
            text-align: right;
            margin: -15px 0 15px;
        }

        .forgot-link a {
            font-size: 13px;
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            height: 45px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-icons a {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .social-icons a:hover {
            background: #fff;
            color: #1e1b4b;
        }

        /* --- Panel Toggle --- */
        .toggle-box {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 150px;
            z-index: 2;
            transition: 1.2s ease-in-out;
        }

        .container.active .toggle-box::before {
            left: 50%;
        }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }

        .toggle-left {
            left: 0;
            transform: translateX(0);
        }

        .container.active .toggle-left {
            transform: translateX(-200%);
        }

        .toggle-right {
            right: -50%;
            transform: translateX(0);
        }

        .container.active .toggle-right {
            right: 0;
        }

        .toggle-panel h1 { font-size: 30px; }
        .toggle-panel p { margin: 15px 0; font-size: 14px; color: #e2e8f0; }
        .toggle-panel .btn {
            background: transparent;
            border: 2px solid #fff;
            width: 130px;
        }

        /* Responsif Mobile */
        @media screen and (max-width: 650px) {
            .container { width: 95%; height: 600px; }
            .form-box { width: 100%; height: 70%; bottom: 0; top: auto; }
            .container.active .form-box { right: 0; bottom: 0; top: auto; }
            .toggle-box::before { display: none; } /* Sederhanakan untuk mobile */
            .toggle-panel { width: 100%; height: 30%; top: 0; }
            .container.active .toggle-panel.toggle-left { top: -30%; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p style="margin-top: 15px; font-size: 12px; color: #cbd5e1;">or login with</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                    <a href="#"><i class='bx bxl-twitter'></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register Now</button>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-discord'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Friend!</h1>
                <p>Don't have an account yet?</p>
                <button class="btn" id="register">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn" id="login">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });
    </script>
</body>
</html>
