<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Latar Belakang Hutan */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.imgur.com/6ah360H.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: rgba(255, 255, 255, 0.15); /* Transparan */
            backdrop-filter: blur(15px); /* Efek Blur */
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out;
        }

        .container.active .form-box.login {
            transform: translateX(100%);
            visibility: hidden;
        }

        .form-box.register {
            transform: translateX(100%);
            visibility: hidden;
        }

        .container.active .form-box.register {
            transform: translateX(0);
            visibility: visible;
            left: 0;
        }

        form { width: 100%; }

        h1 { font-size: 36px; margin-bottom: 10px; color: #fff; }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid transparent;
            border-radius: 10px;
            outline: none;
            color: #fff;
            transition: 0.3s;
        }

        .input-box input::placeholder { color: #ddd; }

        .input-box input:focus {
            border-color: #7494ec;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(116, 148, 236, 0.4);
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #fff;
        }

        .forgot-link { margin: -10px 0 15px; text-align: right; }
        .forgot-link a { font-size: 14px; color: #fff; }

        .btn {
            width: 100%;
            height: 48px;
            background: #7494ec;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .social-icons a {
            padding: 10px;
            border: 1px solid #fff;
            border-radius: 10px;
            color: #fff;
            margin: 0 8px;
            font-size: 20px;
            transition: 0.3s;
        }

        .social-icons a:hover { background: #fff; color: #7494ec; }

        /* Toggle Panels */
        .toggle-box {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: #7494ec;
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }

        .container.active .toggle-box::before { left: 50%; }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }

        .toggle-left { left: 0; }
        .container.active .toggle-left { left: -50%; }

        .toggle-right { right: -50%; }
        .container.active .toggle-right { right: 0; }

        .toggle-panel .btn {
            width: 160px;
            background: transparent;
            border: 2px solid #fff;
            margin-top: 20px;
        }

        /* Responsive Mobile */
        @media screen and (max-width: 650px) {
            .container { width: 90%; height: 90vh; }
            .form-box { width: 100%; height: 70%; bottom: 0; right: 0; }
            .container.active .form-box { right: 0; bottom: 30%; }
            .toggle-box::before { display: none; } /* Simpler for mobile */
            .toggle-panel { width: 100%; height: 30%; }
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="forgot-link"><a href="#">Forgot Password?</a></div>
                <button type="submit" class="btn">Login</button>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Friend!</h1>
                <p>Don't have an account?</p>
                <button class="btn" id="register">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn" id="login">Login</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.onclick = () => container.classList.add('active');
        loginBtn.onclick = () => container.classList.remove('active');
    </script>
</body>
</html>
