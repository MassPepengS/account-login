<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Transparent Login - Diprella Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #2b2b4b, #1e1e2f);
      overflow: hidden;
      position: relative;
    }

    /* Efek Glow Latar Belakang (dipertahankan) */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(102,126,234,0.3), transparent 70%);
      top: -100px;
      left: -100px;
      animation: moveGlow 15s infinite alternate;
      z-index: 1;
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(118,75,162,0.3), transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: moveGlow 20s infinite alternate-reverse;
      z-index: 1;
    }

    @keyframes moveGlow {
      0% { transform: translate(0, 0); }
      100% { transform: translate(80px, 80px); }
    }

    /* === STYLES UNTUK KARTU (Duplikasi Referensi) === */
    .container {
      width: 380px;
      height: 500px; /* Ukuran pas untuk semua elemen */
      perspective: 1200px;
      z-index: 10;
      position: relative;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .container.active .card {
      transform: rotateY(180deg);
    }

    .form-box {
      position: absolute;
      width: 100%;
      height: 100%;
      /* Glassmorphism effect: diperkuat blurnya */
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      backface-visibility: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .signup {
      transform: rotateY(180deg);
    }

    /* Judul modern & besar */
    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    /* Input box transparan sempurna */
    .input-box {
      margin-bottom: 15px;
    }

    .input-box input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1); /* Border tipis transparan */
      outline: none;
      background: rgba(0, 0, 0, 0.2); /* Gelap transparan agar input terlihat */
      color: #fff;
      transition: 0.3s;
    }

    .input-box input:focus {
      border: 1px solid #8a9cff;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 15px rgba(138,156,255,0.4);
    }

    .input-box input::placeholder {
      color: #aaa;
    }

    /* Tombol gradasi utama */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(102,126,234,0.5);
      opacity: 0.95;
    }

    /* Forgot password dipertahankan */
    .forgot {
      text-align: right;
      font-size: 12px;
      margin-top: 5px;
      cursor: pointer;
      color: #bbb;
      transition: 0.3s;
    }

    .forgot:hover {
      color: #fff;
    }

    /* Baris tombol sosial */
    .social {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    /* Styling Ikon Sosial agar rapi (Sama seperti update sebelumnya) */
    .social button {
      flex: 1;
      background: rgba(255,255,255,0.08); /* Sangat transparan */
      font-size: 13px;
      font-weight: 400;
      margin-top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px; /* Jarak antara ikon dan teks */
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .social button:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Ukuran ikon disesuaikan */
    .social button img {
      width: 18px; 
      height: 18px;
    }

    /* Bagian bawah (Don't have an account) */
    p {
      text-align: center;
      margin-top: auto; /* Mendorong teks ke bawah */
      font-size: 14px;
      color: #ccc;
    }

    span {
      color: #a8b2ff;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none; /* Lebih bersih tanpa underline di awal */
      transition: 0.3s;
    }

    span:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container" id="container">
    <div class="card">
      <div class="form-box login">
        <h2>Welcome Back</h2>
        <div class="input-box">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required>
        </div>
        <div class="forgot">Forgot Password?</div>
        <button>Login</button>

        <div class="social">
          <button>
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google Logo">
            Google
          </button>
          <button>
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Discord Logo">
            Discord
          </button>
        </div>

        <p>Don't have an account? <span onclick="flip()">Sign up</span></p>
      </div>

      <div class="form-box signup">
        <h2>Create Account</h2>
        <div class="input-box">
          <input type="text" placeholder="Username" required>
        </div>
        <div class="input-box">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Password" required>
        </div>
        <button>Sign Up</button>

        <div class="social">
          <button>
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google Logo">
            Google
          </button>
          <button>
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Discord Logo">
            Discord
          </button>
        </div>

        <p>Already have an account? <span onclick="flip()">Login</span></p>
      </div>
    </div>
  </div>

  <script>
    // Fungsi untuk memutar kartu
    function flip() {
      document.getElementById('container').classList.toggle('active');
    }
  </script>

</body>
</html>
